version: '3.8'

services:

  # ── Evolution API (WhatsApp) ──────────────────────────────────────────────
  evolution:
    image: atendai/evolution-api:v2.2.3
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-minha-chave-aqui}
      # Envia todas as mensagens para o backend automaticamente
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://backend:8000/whatsapp/webhook
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      # Inclui base64 das mídias no webhook (necessário para salvar comprovantes)
      WEBHOOK_GLOBAL_WEBHOOK_BASE64: "true"
      # Banco de dados interno da Evolution (SQLite é suficiente para uma loja)
      DATABASE_ENABLED: "false"
      LOG_LEVEL: ERROR
    volumes:
      - evolution_instances:/evolution/instances

  # ── Backend FastAPI ───────────────────────────────────────────────────────
  backend:
    build: .
    container_name: secretaria-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-minha-chave-aqui}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-secretaria}
      DEFAULT_LOJA_ID: ${DEFAULT_LOJA_ID:-1}
      # URL pública do backend (usada para configurar o webhook na Evolution)
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:8000}
      STORAGE_DIR: /app/storage_uploads
    volumes:
      - storage:/app/storage_uploads
    depends_on:
      - evolution

volumes:
  evolution_instances:
  storage:
